<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  </head>
  <body>
    <a-scene mindar-image="imageTargetSrc: ./targets.mind; autoStart: true; uiScanning: yes" 
             vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
      
      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0">
        
        <a-text value="AQUEDUTO DA AMOREIRAS" position="-0.7 0.7 0" color="#FFD700" width="4" font="aileronwhite"></a-text>
        
        <a-plane position="0 -0.6 0.1" width="1.6" height="0.5" color="#222" opacity="0.9">
          <a-text value="Patrimonio Mundial da UNESCO\nConstruido entre 1498 e 1622\nExtensao total: 8.5 km" 
                  align="center" width="2.2" color="white" position="0 0 0.01"></a-text>
        </a-plane>

        <a-box position="0.7 0 0.2" scale="0.2 0.2 0.2" color="#FFD700" 
               animation="property: rotation; to: 0 360 0; loop: true; dur: 3000"></a-box>

      </a-entity>
    </a-scene>
  </body>
</html>
