<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  </head>
  <body>
    <a-scene mindar-image="imageTargetSrc:.assets/targets.mind;" color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <a-asset-item id="modeloAqueduto" src="./assets/roman_aqueduct_-_no_extra_assets.glb"></a-asset-item>
        <a-box color="red" scale="0.1 0.1 0.1" position="0 0 0"></a-box>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0">
       <a-box color="red" scale="0.1 0.1 0.1" position="0 0 0"></a-box>
      </a-entity>
      
    </a-scene>
  </body>
</html>
