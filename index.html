<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  </head>
  <body>
    <a-scene mindar-image="imageTargetSrc: ./targets.mind;" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <img id="fotoAntiga" src="./assets/aqueduto_antigo.jpg">
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0">
        
        <a-text value="AQUEDUTO DA AMOREIRAS" position="-0.8 0.6 0" color="#FFFFFF" width="3" font="aileronwhite"></a-text>
        
        <a-plane position="0 -0.6 0.1" width="1.5" height="0.4" color="#333" opacity="0.8">
          <a-text value="Local: Elvas, Portugal\nSeculo: XVI - XVII\nExtensao: 8.5 km" align="center" width="2" color="white"></a-text>
        </a-plane>

        <a-box position="0.8 0 0.2" scale="0.2 0.2 0.2" color="#FFD700" 
               animation="property: rotation; to: 0 360 0; loop: true; dur: 4000"></a-box>

      </a-entity>
    </a-scene>
  </body>
</html>
